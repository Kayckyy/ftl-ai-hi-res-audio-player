name: Build Signed APK

on:
  workflow_dispatch:
    inputs:
      buildType:
        description: 'Tipo de build (debug/release)'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Permissão ao gradlew
        run: chmod +x ./gradlew

      - name: Clean
        run: ./gradlew clean

      - name: Build APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ "${{ github.event.inputs.buildType }}" == "release" ]; then
            echo "📦 Buildando RELEASE assinado..."
            ./gradlew assembleRelease
          else
            echo "🔧 Buildando DEBUG..."
            ./gradlew assembleDebug
          fi
        
      - name: Listar arquivos gerados
        run: |
          echo "📁 APKs gerados:"
          find app/build/outputs -name "*.apk" -o -name "*.aab" | while read f; do
            echo "  - $f ($(du -h "$f" | cut -f1))"
          done

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SonicSphere-${{ github.event.inputs.buildType }}
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          retention-days: 7
